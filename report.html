<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- جدار الحماية المباشر -->
    <script>
        const authTime = localStorage.getItem('karate_auth_time');
        const parsedTime = parseInt(authTime, 10);
        const timeElapsed = Date.now() - parsedTime;
        if (!authTime || isNaN(parsedTime) || timeElapsed > 21600000) {
            localStorage.removeItem('karate_auth');
            localStorage.removeItem('karate_auth_time');
            window.location.replace('login.html');
        } else {
            setTimeout(() => {
                localStorage.removeItem('karate_auth');
                localStorage.removeItem('karate_auth_time');
                window.location.replace('login.html');
            }, 21600000 - timeElapsed);
        }
    </script>
    <title>التقرير المالي الشهري - قاعة KARATE</title>

    <main class="max-w-5xl mx-auto px-4 md:px-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 print-container">
            <div class="text-center border-b border-slate-200 pb-4 mb-6">
                <h1 class="text-3xl font-black text-slate-800">التقرير المالي الشهري</h1>
            </div>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-8 print:hidden">
                <label for="monthPicker" class="text-sm font-semibold text-slate-700">اختر الشهر والسنة:</label>
                <input type="month" id="monthPicker" required class="p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white text-slate-800 font-bold">
                <button onclick="generateReport()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-md">عرض التقرير</button>
            </div>
            
            <div id="reportContainer" style="display: none;">
                <h2 id="reportTitle" class="text-2xl font-bold text-slate-800 mb-4 text-center">تقرير شهر: </h2>
                <div id="reportTableContainer" class="overflow-x-auto"></div>
                
                <!-- قسم الإجماليات وصافي الدخل -->
                <div class="mt-8 border-t-2 border-dashed border-slate-200 pt-6 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex flex-col gap-3 text-center md:text-right">
                        <h3 id="reportTotal" class="text-lg font-bold text-slate-700">
                            <span class="text-emerald-600">▲ إجمالي المداخيل:</span>
                            <span class="font-black text-xl ml-2">0 د.ج</span>
                        </h3>
                        <h3 id="reportExpenses" class="text-lg font-bold text-slate-700">

                        <h3 id="reportNetIncome" class="text-4xl font-black text-blue-600">0 د.ج</h3>
                    </div>
