<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- تحويل تلقائي للرئيسية إذا كان مسجل الدخول -->
    <script>
        const authTime = localStorage.getItem('karate_auth_time');
        const parsedTime = parseInt(authTime, 10);
        if (authTime && !isNaN(parsedTime) && (Date.now() - parsedTime) < 21600000) {
            window.location.replace('index.html');
        } else {
            localStorage.removeItem('karate_auth');
            localStorage.removeItem('karate_auth_time');
        }
    </script>
    <title>التحقق من الجهاز - قاعة KARATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Tajawal', 'Cairo', 'sans-serif'], } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        
        /* حركات الرادار والنبض */
        .radar { position: relative; width: 120px; height: 120px; margin: 0 auto; border-radius: 50%; border: 2px solid rgba(59, 130, 246, 0.3); overflow: hidden; box-shadow: 0 0 25px rgba(59, 130, 246, 0.2); }
        .radar::before { content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(59, 130, 246, 0.8), transparent); transform-origin: top left; animation: radar-spin 2s linear infinite; }
        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .pulse-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 50%; border: 2px solid #3b82f6; animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { width: 40px; height: 40px; opacity: 1; } 100% { width: 220px; height: 220px; opacity: 0; } }
        
        /* حركات الانتقال */
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
        
        /* شبكة الخلفية */
        .bg-grid { position: absolute; inset: 0; z-index: 0; opacity: 0.15; pointer-events: none; background-image: radial-gradient(#3b82f6 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    
    <!-- خلفية الشبكة -->
    <div class="bg-grid"></div>

    <!-- شاشة الانتظار والفحص (تظهر أولاً) -->
    <div id="waiting-screen" class="text-center fade-in z-10 relative">
        <div class="relative mb-8">
            <div class="radar"></div>
            <div class="pulse-ring"></div>
            <div class="absolute inset-0 flex items-center justify-center text-4xl">🛡️</div>
        </div>
        <h1 class="text-3xl font-black mb-3 text-white tracking-wide">تم اكتشاف جهاز جديد</h1>
        <p class="text-slate-400 font-medium max-w-sm mx-auto leading-relaxed">جاري فحص بيئة الاتصال وتأمين البيانات... يرجى الانتظار للحظات.</p>
        
        <div class="mt-8 flex justify-center gap-3">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <!-- شاشة إدخال الرمز السري (تظهر بعد الانتظار) -->
    <div id="login-screen" class="hidden bg-slate-800/80 backdrop-blur-xl p-8 rounded-3xl shadow-2xl max-w-md w-full border border-slate-700 z-10 relative">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-[0_0_15px_rgba(59,130,246,0.3)]">🔒</div>
            <h1 class="text-2xl font-black text-white">مصادقة الجهاز مطلوبة</h1>
            <p class="text-slate-400 mt-2 font-medium text-sm">أدخل بيانات الاعتماد لربط هذا الجهاز بقاعدة البيانات</p>
        </div>

        <div id="error-msg" class="hidden bg-red-500/20 text-red-400 p-4 rounded-xl mb-6 text-sm font-bold border border-red-500/30 text-center">
            الرمز أو كلمة المرور غير صحيحة! تأكد من البيانات.
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">رمز المستخدم</label>
                <input type="text" id="username" placeholder="KARATE" required dir="ltr" class="w-full px-4 py-3 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold text-white bg-slate-900/50 transition-colors placeholder-slate-600">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">مفتاح فك التشفير (كلمة المرور)</label>
                <input type="password" id="password" required dir="ltr" class="w-full px-4 py-3 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold text-white bg-slate-900/50 transition-colors tracking-widest">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(59,130,246,0.4)] hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] mt-4">
                تأكيد وربط الجهاز
            </button>
        </form>
    </div>

    <script>
        // برمجة توقيت شاشة الانتظار (تستمر لـ 3 ثواني ثم تظهر شاشة الدخول)
        setTimeout(() => {
            const waitingScreen = document.getElementById('waiting-screen');
            const loginScreen = document.getElementById('login-screen');
            
            // إضافة حركة التلاشي والاختفاء
            waitingScreen.classList.replace('fade-in', 'fade-out');
            
            setTimeout(() => {
                waitingScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                loginScreen.classList.add('fade-in');
            }, 500); // الانتظار نصف ثانية لتكتمل حركة الإخفاء
            
        }, 3500); // مدة عرض الرادار (3.5 ثواني)

        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (user === 'Coach' && pass === 'Ayhem') {
                localStorage.setItem('karate_auth', 'true');
                localStorage.setItem('karate_role', 'admin');
                localStorage.setItem('karate_auth_time', Date.now().toString());
                window.location.replace('index.html');
            } else if (user === 'Athlete' && pass === '2025') {
                localStorage.setItem('karate_auth', 'true');
                localStorage.setItem('karate_role', 'athlete');
                localStorage.setItem('karate_auth_time', Date.now().toString());
                window.location.replace('index.html');
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
