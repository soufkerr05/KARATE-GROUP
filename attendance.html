<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- جدار الحماية المباشر -->
    <script>
        const authTime = localStorage.getItem('karate_auth_time');
        const parsedTime = parseInt(authTime, 10);
        const timeElapsed = Date.now() - parsedTime;
        if (!authTime || isNaN(parsedTime) || timeElapsed > 21600000) {
            localStorage.removeItem('karate_auth');
            localStorage.removeItem('karate_auth_time');
            window.location.replace('login.html');
        } else {
            setTimeout(() => {
                localStorage.removeItem('karate_auth');
                localStorage.removeItem('karate_auth_time');
                window.location.replace('login.html');
            }, 21600000 - timeElapsed);
        }
    </script>
    <title>تسجيل الحضور اليومي - قاعة KARATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- إعدادات Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css">

                    <a href="index.html" class="absolute right-1/2 translate-x-1/2 md:relative md:right-auto md:translate-x-0 flex-shrink-0 text-xl font-black text-slate-800 flex items-center gap-2">
                        <span class="text-2xl">🥋</span>

                    <a href="payments.html" class="px-3 py-2 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المدفوعات</a>
                    <a href="expenses.html" class="px-3 py-2 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المصاريف</a>
                    <a href="report.html" class="px-3 py-2 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">التقرير</a>
                    <a href="kimono.html" class="px-3 py-2 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المخزون</a>

                </nav>

                <!-- اليسار: أيقونات الإضافة والإجراءات -->
                <div class="hidden md:flex items-center gap-2 flex-shrink-0 border-r-2 border-slate-200 pr-4 mr-2 md:border-r-2 md:pr-4">
                <a href="settings.html" class="bg-slate-500 hover:bg-slate-600 text-white p-2.5 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5" title="الإعدادات">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </a>
                </div>
            </div>
        </div>

    <!-- القائمة المنسدلة للهواتف -->
    <nav id="mobileMenu" class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-xl flex-col items-center justify-center gap-6 p-8 md:hidden animate-[slideDownFull_0.3s_ease-out]">
        <button onclick="toggleMobileMenu()" class="absolute top-6 right-6 text-slate-500 hover:text-red-500 p-3 bg-slate-100 hover:bg-red-50 rounded-full transition-colors">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <a href="index.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">إدارة الرياضيين</a>
        <a href="attendance.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl bg-blue-600 text-white shadow-lg">الحضور</a>
        <a href="payments.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المدفوعات</a>
        <a href="expenses.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المصاريف</a>
        <a href="report.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">التقرير</a>
        <a href="kimono.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">المخزون</a>
        <a href="dashboard.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">الإحصائيات</a>
        <a href="training_sessions.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">الحصص التدريبية</a>
        <a href="settings.html" class="w-full text-center px-4 py-4 rounded-2xl font-black text-xl text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">الإعدادات</a>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 md:px-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <div class="border-b border-slate-200 pb-4 mb-6">
                <h1 class="text-2xl font-bold text-slate-800">تسجيل حضور حصة</h1>
                <p class="text-slate-500 mt-1">اختر تاريخ الحصة لعرض قائمة الرياضيين.</p>
            </div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4 border-b border-slate-100 pb-6">
                <div class="w-full md:max-w-sm">
                    <label for="sessionDate" class="block text-sm font-semibold text-slate-700 mb-1">تاريخ الحصة:</label>
                    <input type="date" id="sessionDate" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white text-slate-800 font-bold">
                </div>
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <label for="sortSelect" class="text-sm font-bold text-slate-600 whitespace-nowrap">ترتيب حسب:</label>
                        <select id="sortSelect" onchange="renderAttendanceTable()" class="w-full sm:w-48 p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-slate-700 bg-slate-50 transition-all cursor-pointer">
                            <option value="default">الافتراضي</option>
                            <option value="alpha">الترتيب الأبجدي (أ - ي)</option>
                            <option value="expired">صلاحية الاشتراك (المنتهية أولاً)</option>
                            <option value="attended">حاضر اليوم أولاً</option>
                            <option value="not_attended">غائب اليوم أولاً</option>
                        </select>
                    </div>
                    <div class="relative w-full sm:w-64 flex-shrink-0">
                        <input type="text" id="searchInput" oninput="renderAttendanceTable()" placeholder="بحث بالاسم، الولي أو الهاتف..." class="w-full p-2.5 pr-10 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-slate-700 bg-slate-50 transition-all">
                        <svg class="w-5 h-5 text-slate-400 absolute right-3 top-3 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
            </div>
            <form id="attendanceForm">
            <div class="flex justify-between items-center mb-4 print:hidden gap-3">
                <div class="text-sm font-bold bg-emerald-50 text-emerald-700 px-3 sm:px-4 py-2.5 rounded-xl border border-emerald-200 flex items-center gap-1 sm:gap-2 shadow-sm whitespace-nowrap">
                    <svg class="w-5 h-5 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    حضور اليوم: <span id="todayAttendanceCount" class="text-lg font-black ml-1 text-emerald-800">0</span>
                </div>
                <button type="button" onclick="toggleAllCheckboxes()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2.5 px-3 sm:px-4 rounded-xl text-xs sm:text-sm transition-colors flex items-center gap-2 border border-blue-200 shadow-sm admin-only whitespace-nowrap">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    تحديد / إلغاء الكل
                </button>
            </div>
                <div id="attendanceList" class="space-y-3"></div>
            <button type="submit" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-3 px-4 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 admin-only">حفظ الحضور</button>
            </form>
        </div>
    </main>

    <!-- نافذة عرض تفاصيل الحضور -->
    <div id="historyModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" style="display: none;" dir="rtl">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md relative flex flex-col overflow-hidden animate-[fade-in_0.2s_ease-out]">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-slate-400 hover:text-red-500 transition-colors p-1" aria-label="إغلاق">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">
                <h2 id="modalAthleteName" class="text-xl font-bold text-slate-800">سجل الحضور</h2>
            </div>
            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <ul id="modalAttendanceList" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <script src="attendance.js"></script>
</body>
</html>
